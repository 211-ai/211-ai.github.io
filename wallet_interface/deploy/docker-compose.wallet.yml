services:
  wallet-api:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.api
    environment:
      WALLET_REPOSITORY_ROOT: /var/lib/211-ai/wallet-repository
      WALLET_STORAGE_CONFIG: ${WALLET_STORAGE_CONFIG:-}
      WALLET_STORAGE_TYPE: ${WALLET_STORAGE_TYPE:-local}
      WALLET_STORAGE_ROOT: ${WALLET_STORAGE_ROOT:-/var/lib/211-ai/wallet-blobs}
      WALLET_STORAGE_BUCKET: ${WALLET_STORAGE_BUCKET:-}
      WALLET_STORAGE_PREFIX: ${WALLET_STORAGE_PREFIX:-}
      WALLET_STORAGE_PIN: ${WALLET_STORAGE_PIN:-}
      WALLET_STORAGE_MIRRORS: ${WALLET_STORAGE_MIRRORS:-}
      IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI: ${IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI:-}
      IPFS_HOST: ${IPFS_HOST:-}
      WALLET_IPFS_PUBLIC_GATEWAY_BASE_URL: ${WALLET_IPFS_PUBLIC_GATEWAY_BASE_URL:-https://w3s.link/ipfs}
      WALLET_FILECOIN_PIN_SERVICE_URL: ${WALLET_FILECOIN_PIN_SERVICE_URL:-}
      WALLET_FILECOIN_PIN_ORIGINS: ${WALLET_FILECOIN_PIN_ORIGINS:-}
      WALLET_FILECOIN_PIN_BEARER_TOKEN: ${WALLET_FILECOIN_PIN_BEARER_TOKEN:-}
      WALLET_FILECOIN_PIN_HTTP_HEADER_NAME: ${WALLET_FILECOIN_PIN_HTTP_HEADER_NAME:-}
      WALLET_FILECOIN_PIN_HTTP_HEADER_VALUE: ${WALLET_FILECOIN_PIN_HTTP_HEADER_VALUE:-}
      WALLET_FILECOIN_PIN_TIMEOUT_SECONDS: ${WALLET_FILECOIN_PIN_TIMEOUT_SECONDS:-30}
      WALLET_PROOF_MODE: production
      WALLET_PROOF_BACKEND: ${WALLET_PROOF_BACKEND:-deterministic-location-region}
      WALLET_PROOF_SERVICE_URL: ${WALLET_PROOF_SERVICE_URL:-}
      WALLET_PROOF_VERIFIER_ID: ${WALLET_PROOF_VERIFIER_ID:-}
      WALLET_PROOF_SYSTEM: ${WALLET_PROOF_SYSTEM:-}
      WALLET_PROOF_CIRCUIT_ID: ${WALLET_PROOF_CIRCUIT_ID:-}
      WALLET_PROOF_PROVE_PATH: ${WALLET_PROOF_PROVE_PATH:-}
      WALLET_PROOF_DISTANCE_PROVE_PATH: ${WALLET_PROOF_DISTANCE_PROVE_PATH:-}
      WALLET_PROOF_VERIFY_PATH: ${WALLET_PROOF_VERIFY_PATH:-}
      WALLET_PROOF_BEARER_TOKEN: ${WALLET_PROOF_BEARER_TOKEN:-}
      WALLET_PROOF_HTTP_HEADER_NAME: ${WALLET_PROOF_HTTP_HEADER_NAME:-}
      WALLET_PROOF_HTTP_HEADER_VALUE: ${WALLET_PROOF_HTTP_HEADER_VALUE:-}
      WALLET_PROOF_CREDENTIAL_SECRET_REF: ${WALLET_PROOF_CREDENTIAL_SECRET_REF:-}
      WALLET_PROOF_TIMEOUT_SECONDS: ${WALLET_PROOF_TIMEOUT_SECONDS:-30}
      WALLET_AUTO_LOAD_REPOSITORY: "true"
      WALLET_AUTO_PERSIST: "true"
      WALLET_API_CORS_ORIGINS: ${WALLET_API_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,https://211-ai.com,https://abby.network,https://abetterbridgetoyou.com}
      WALLET_OPS_HEALTH_SHARED_SECRET: ${WALLET_OPS_HEALTH_SHARED_SECRET:-change-me}
      WALLET_OPS_HEALTH_SECRET_REF: ${WALLET_OPS_HEALTH_SECRET_REF:-}
      WALLET_OPS_ALERT_BEARER_TOKEN: ${WALLET_OPS_ALERT_BEARER_TOKEN:-}
      WALLET_OPS_ALERT_HEADER_NAME: ${WALLET_OPS_ALERT_HEADER_NAME:-}
      WALLET_OPS_ALERT_HEADER_VALUE: ${WALLET_OPS_ALERT_HEADER_VALUE:-}
      WALLET_OPS_ALERT_SECRET_REF: ${WALLET_OPS_ALERT_SECRET_REF:-}
      WALLET_DEAD_DROP_SMTP_HOST: ${WALLET_DEAD_DROP_SMTP_HOST:-}
      WALLET_DEAD_DROP_SMTP_PORT: ${WALLET_DEAD_DROP_SMTP_PORT:-587}
      WALLET_DEAD_DROP_SMTP_USE_SSL: ${WALLET_DEAD_DROP_SMTP_USE_SSL:-false}
      WALLET_DEAD_DROP_SMTP_STARTTLS: ${WALLET_DEAD_DROP_SMTP_STARTTLS:-true}
      WALLET_DEAD_DROP_SMTP_USERNAME: ${WALLET_DEAD_DROP_SMTP_USERNAME:-}
      WALLET_DEAD_DROP_SMTP_PASSWORD: ${WALLET_DEAD_DROP_SMTP_PASSWORD:-}
      WALLET_DEAD_DROP_FROM_EMAIL: ${WALLET_DEAD_DROP_FROM_EMAIL:-no-reply@211-ai.org}
      WALLET_SMS_BACKEND: ${WALLET_SMS_BACKEND:-}
      WALLET_SMS_WEBHOOK_URL: ${WALLET_SMS_WEBHOOK_URL:-}
      WALLET_SMS_BEARER_TOKEN: ${WALLET_SMS_BEARER_TOKEN:-}
      WALLET_SMS_HTTP_HEADER_NAME: ${WALLET_SMS_HTTP_HEADER_NAME:-}
      WALLET_SMS_HTTP_HEADER_VALUE: ${WALLET_SMS_HTTP_HEADER_VALUE:-}
      WALLET_SMS_TIMEOUT_SECONDS: ${WALLET_SMS_TIMEOUT_SECONDS:-15}
      WALLET_CALL_BACKEND: ${WALLET_CALL_BACKEND:-}
      WALLET_CALL_WEBHOOK_URL: ${WALLET_CALL_WEBHOOK_URL:-}
      WALLET_CALL_BEARER_TOKEN: ${WALLET_CALL_BEARER_TOKEN:-}
      WALLET_CALL_HTTP_HEADER_NAME: ${WALLET_CALL_HTTP_HEADER_NAME:-}
      WALLET_CALL_HTTP_HEADER_VALUE: ${WALLET_CALL_HTTP_HEADER_VALUE:-}
      WALLET_CALL_TIMEOUT_SECONDS: ${WALLET_CALL_TIMEOUT_SECONDS:-20}
      WALLET_STORAGE_CREDENTIAL_SECRET_REF: ${WALLET_STORAGE_CREDENTIAL_SECRET_REF:-}
      WALLET_STORAGE_RETENTION_POLICY_REF: ${WALLET_STORAGE_RETENTION_POLICY_REF:-}
      WALLET_STORAGE_IPFS_PINNING_POLICY_REF: ${WALLET_STORAGE_IPFS_PINNING_POLICY_REF:-}
      WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF: ${WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF:-}
      WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF: ${WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF:-}
      WALLET_BACKUP_PURGE_POLICY_REF: ${WALLET_BACKUP_PURGE_POLICY_REF:-}
      WALLET_ALERT_RETENTION_POLICY_REF: ${WALLET_ALERT_RETENTION_POLICY_REF:-}
    volumes:
      - wallet_state:/var/lib/211-ai

  filecoin-pin:
    profiles:
      - filecoin-pin
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.filecoin-pin
      args:
        FILECOIN_PIN_NPM_VERSION: ${FILECOIN_PIN_VERSION:-0.20.1}
    environment:
      PORT: "3456"
      HOST: 0.0.0.0
      ACCESS_TOKEN: ${FILECOIN_PIN_ACCESS_TOKEN:-}
      PRIVATE_KEY: ${FILECOIN_PIN_PRIVATE_KEY:-}
      WALLET_ADDRESS: ${FILECOIN_PIN_WALLET_ADDRESS:-}
      SESSION_KEY: ${FILECOIN_PIN_SESSION_KEY:-}
      NETWORK: ${FILECOIN_PIN_NETWORK:-}
      RPC_URL: ${FILECOIN_PIN_RPC_URL:-}
      DATABASE_PATH: /var/lib/filecoin-pin/pins.db
      CAR_STORAGE_PATH: /var/lib/filecoin-pin/cars
      LOG_LEVEL: ${FILECOIN_PIN_LOG_LEVEL:-info}
    restart: unless-stopped
    volumes:
      - filecoin_pin_state:/var/lib/filecoin-pin

  wallet-ops:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.api
    command:
      - python
      - -m
      - wallet_interface.ops
      - --watch
      - --interval-seconds
      - "300"
      - --fail-on-error
      - --output-jsonl
      - /var/log/211-ai/wallet-ops-health.jsonl
    environment:
      WALLET_REPOSITORY_ROOT: /var/lib/211-ai/wallet-repository
      WALLET_STORAGE_CONFIG: ${WALLET_STORAGE_CONFIG:-}
      WALLET_STORAGE_TYPE: ${WALLET_STORAGE_TYPE:-local}
      WALLET_STORAGE_ROOT: ${WALLET_STORAGE_ROOT:-/var/lib/211-ai/wallet-blobs}
      WALLET_STORAGE_BUCKET: ${WALLET_STORAGE_BUCKET:-}
      WALLET_STORAGE_PREFIX: ${WALLET_STORAGE_PREFIX:-}
      WALLET_STORAGE_PIN: ${WALLET_STORAGE_PIN:-}
      WALLET_STORAGE_MIRRORS: ${WALLET_STORAGE_MIRRORS:-}
      IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI: ${IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI:-}
      IPFS_HOST: ${IPFS_HOST:-}
      WALLET_PROOF_MODE: production
      WALLET_PROOF_BACKEND: ${WALLET_PROOF_BACKEND:-deterministic-location-region}
      WALLET_PROOF_SERVICE_URL: ${WALLET_PROOF_SERVICE_URL:-}
      WALLET_PROOF_VERIFIER_ID: ${WALLET_PROOF_VERIFIER_ID:-}
      WALLET_PROOF_SYSTEM: ${WALLET_PROOF_SYSTEM:-}
      WALLET_PROOF_CIRCUIT_ID: ${WALLET_PROOF_CIRCUIT_ID:-}
      WALLET_PROOF_PROVE_PATH: ${WALLET_PROOF_PROVE_PATH:-}
      WALLET_PROOF_DISTANCE_PROVE_PATH: ${WALLET_PROOF_DISTANCE_PROVE_PATH:-}
      WALLET_PROOF_VERIFY_PATH: ${WALLET_PROOF_VERIFY_PATH:-}
      WALLET_PROOF_BEARER_TOKEN: ${WALLET_PROOF_BEARER_TOKEN:-}
      WALLET_PROOF_HTTP_HEADER_NAME: ${WALLET_PROOF_HTTP_HEADER_NAME:-}
      WALLET_PROOF_HTTP_HEADER_VALUE: ${WALLET_PROOF_HTTP_HEADER_VALUE:-}
      WALLET_PROOF_CREDENTIAL_SECRET_REF: ${WALLET_PROOF_CREDENTIAL_SECRET_REF:-}
      WALLET_PROOF_TIMEOUT_SECONDS: ${WALLET_PROOF_TIMEOUT_SECONDS:-30}
      WALLET_AUTO_LOAD_REPOSITORY: "true"
      WALLET_AUTO_PERSIST: "true"
      WALLET_OPS_HEALTH_SHARED_SECRET: ${WALLET_OPS_HEALTH_SHARED_SECRET:-change-me}
      WALLET_OPS_HEALTH_SECRET_REF: ${WALLET_OPS_HEALTH_SECRET_REF:-}
      WALLET_OPS_ALERT_WEBHOOK_URL: ${WALLET_OPS_ALERT_WEBHOOK_URL:-}
      WALLET_OPS_ALERT_ON: ${WALLET_OPS_ALERT_ON:-error}
      WALLET_OPS_ALERT_BEARER_TOKEN: ${WALLET_OPS_ALERT_BEARER_TOKEN:-}
      WALLET_OPS_ALERT_HEADER_NAME: ${WALLET_OPS_ALERT_HEADER_NAME:-}
      WALLET_OPS_ALERT_HEADER_VALUE: ${WALLET_OPS_ALERT_HEADER_VALUE:-}
      WALLET_OPS_ALERT_SECRET_REF: ${WALLET_OPS_ALERT_SECRET_REF:-}
      WALLET_STORAGE_CREDENTIAL_SECRET_REF: ${WALLET_STORAGE_CREDENTIAL_SECRET_REF:-}
      WALLET_STORAGE_RETENTION_POLICY_REF: ${WALLET_STORAGE_RETENTION_POLICY_REF:-}
      WALLET_STORAGE_IPFS_PINNING_POLICY_REF: ${WALLET_STORAGE_IPFS_PINNING_POLICY_REF:-}
      WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF: ${WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF:-}
      WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF: ${WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF:-}
      WALLET_BACKUP_PURGE_POLICY_REF: ${WALLET_BACKUP_PURGE_POLICY_REF:-}
      WALLET_ALERT_RETENTION_POLICY_REF: ${WALLET_ALERT_RETENTION_POLICY_REF:-}
    volumes:
      - wallet_state:/var/lib/211-ai
      - wallet_logs:/var/log/211-ai
    depends_on:
      - wallet-api

  wallet-ui:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.ui
      args:
        VITE_WALLET_API_BASE_URL: ${VITE_WALLET_API_BASE_URL:-same-origin}
    environment:
      VITE_WALLET_API_BASE_URL: ${VITE_WALLET_API_BASE_URL:-same-origin}
      ABBY_RUNTIME_WALLET_API_BASE_URL: ${ABBY_RUNTIME_WALLET_API_BASE_URL:-same-origin}
      ABBY_RUNTIME_WALLET_ID: ${ABBY_RUNTIME_WALLET_ID:-}
      ABBY_RUNTIME_ACTOR_DID: ${ABBY_RUNTIME_ACTOR_DID:-}
      ABBY_RUNTIME_ISSUER_KEY_HEX: ${ABBY_RUNTIME_ISSUER_KEY_HEX:-}
      ABBY_RUNTIME_AUDIENCE_KEY_HEX: ${ABBY_RUNTIME_AUDIENCE_KEY_HEX:-}
      ABBY_RUNTIME_FILECOIN_UPLOAD_URL: ${ABBY_RUNTIME_FILECOIN_UPLOAD_URL:-/filecoin-upload}
      ABBY_RUNTIME_FILECOIN_CLIENT_TOKEN: ${ABBY_RUNTIME_FILECOIN_CLIENT_TOKEN:-}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - wallet-api

volumes:
  wallet_state:
  wallet_logs:
  filecoin_pin_state:
