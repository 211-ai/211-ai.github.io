services:
  wallet-api:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.api
    environment:
      WALLET_REPOSITORY_ROOT: /var/lib/211-ai/wallet-repository
      WALLET_STORAGE_CONFIG: >-
        {"primary":{"type":"local","root":"/var/lib/211-ai/wallet-blobs"}}
      WALLET_PROOF_MODE: production
      WALLET_PROOF_BACKEND: deterministic-location-region
      WALLET_AUTO_LOAD_REPOSITORY: "true"
      WALLET_AUTO_PERSIST: "true"
    ports:
      - "8000:8000"
    volumes:
      - wallet_state:/var/lib/211-ai

  wallet-ops:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.api
    command:
      - python
      - -m
      - wallet_interface.ops
      - --watch
      - --interval-seconds
      - "300"
      - --fail-on-error
      - --output-jsonl
      - /var/log/211-ai/wallet-ops-health.jsonl
    environment:
      WALLET_REPOSITORY_ROOT: /var/lib/211-ai/wallet-repository
      WALLET_STORAGE_CONFIG: >-
        {"primary":{"type":"local","root":"/var/lib/211-ai/wallet-blobs"}}
      WALLET_PROOF_MODE: production
      WALLET_PROOF_BACKEND: deterministic-location-region
      WALLET_AUTO_LOAD_REPOSITORY: "true"
      WALLET_AUTO_PERSIST: "true"
    volumes:
      - wallet_state:/var/lib/211-ai
      - wallet_logs:/var/log/211-ai
    depends_on:
      - wallet-api

  wallet-ui:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.ui
    ports:
      - "8080:8080"
    depends_on:
      - wallet-api

volumes:
  wallet_state:
  wallet_logs:

