services:
  wallet-api:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.api
    environment:
      WALLET_REPOSITORY_ROOT: /var/lib/211-ai/wallet-repository
      WALLET_STORAGE_CONFIG: >-
        {"primary":{"type":"local","root":"/var/lib/211-ai/wallet-blobs"}}
      WALLET_PROOF_MODE: production
      WALLET_PROOF_BACKEND: ${WALLET_PROOF_BACKEND:-deterministic-location-region}
      WALLET_PROOF_SERVICE_URL: ${WALLET_PROOF_SERVICE_URL:-}
      WALLET_PROOF_VERIFIER_ID: ${WALLET_PROOF_VERIFIER_ID:-}
      WALLET_PROOF_SYSTEM: ${WALLET_PROOF_SYSTEM:-}
      WALLET_PROOF_CIRCUIT_ID: ${WALLET_PROOF_CIRCUIT_ID:-}
      WALLET_PROOF_PROVE_PATH: ${WALLET_PROOF_PROVE_PATH:-}
      WALLET_PROOF_DISTANCE_PROVE_PATH: ${WALLET_PROOF_DISTANCE_PROVE_PATH:-}
      WALLET_PROOF_VERIFY_PATH: ${WALLET_PROOF_VERIFY_PATH:-}
      WALLET_PROOF_BEARER_TOKEN: ${WALLET_PROOF_BEARER_TOKEN:-}
      WALLET_PROOF_HTTP_HEADER_NAME: ${WALLET_PROOF_HTTP_HEADER_NAME:-}
      WALLET_PROOF_HTTP_HEADER_VALUE: ${WALLET_PROOF_HTTP_HEADER_VALUE:-}
      WALLET_PROOF_CREDENTIAL_SECRET_REF: ${WALLET_PROOF_CREDENTIAL_SECRET_REF:-}
      WALLET_PROOF_TIMEOUT_SECONDS: ${WALLET_PROOF_TIMEOUT_SECONDS:-30}
      WALLET_AUTO_LOAD_REPOSITORY: "true"
      WALLET_AUTO_PERSIST: "true"
      WALLET_API_CORS_ORIGINS: ${WALLET_API_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,https://211-ai.com,https://abby.network,https://abetterbridgetoyou.com}
      WALLET_OPS_HEALTH_SHARED_SECRET: ${WALLET_OPS_HEALTH_SHARED_SECRET:-change-me}
      WALLET_OPS_HEALTH_SECRET_REF: ${WALLET_OPS_HEALTH_SECRET_REF:-}
      WALLET_OPS_ALERT_BEARER_TOKEN: ${WALLET_OPS_ALERT_BEARER_TOKEN:-}
      WALLET_OPS_ALERT_HEADER_NAME: ${WALLET_OPS_ALERT_HEADER_NAME:-}
      WALLET_OPS_ALERT_HEADER_VALUE: ${WALLET_OPS_ALERT_HEADER_VALUE:-}
      WALLET_OPS_ALERT_SECRET_REF: ${WALLET_OPS_ALERT_SECRET_REF:-}
      WALLET_STORAGE_CREDENTIAL_SECRET_REF: ${WALLET_STORAGE_CREDENTIAL_SECRET_REF:-}
      WALLET_STORAGE_RETENTION_POLICY_REF: ${WALLET_STORAGE_RETENTION_POLICY_REF:-}
      WALLET_STORAGE_IPFS_PINNING_POLICY_REF: ${WALLET_STORAGE_IPFS_PINNING_POLICY_REF:-}
      WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF: ${WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF:-}
      WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF: ${WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF:-}
      WALLET_BACKUP_PURGE_POLICY_REF: ${WALLET_BACKUP_PURGE_POLICY_REF:-}
      WALLET_ALERT_RETENTION_POLICY_REF: ${WALLET_ALERT_RETENTION_POLICY_REF:-}
    volumes:
      - wallet_state:/var/lib/211-ai

  wallet-ops:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.api
    command:
      - python
      - -m
      - wallet_interface.ops
      - --watch
      - --interval-seconds
      - "300"
      - --fail-on-error
      - --output-jsonl
      - /var/log/211-ai/wallet-ops-health.jsonl
    environment:
      WALLET_REPOSITORY_ROOT: /var/lib/211-ai/wallet-repository
      WALLET_STORAGE_CONFIG: >-
        {"primary":{"type":"local","root":"/var/lib/211-ai/wallet-blobs"}}
      WALLET_PROOF_MODE: production
      WALLET_PROOF_BACKEND: ${WALLET_PROOF_BACKEND:-deterministic-location-region}
      WALLET_PROOF_SERVICE_URL: ${WALLET_PROOF_SERVICE_URL:-}
      WALLET_PROOF_VERIFIER_ID: ${WALLET_PROOF_VERIFIER_ID:-}
      WALLET_PROOF_SYSTEM: ${WALLET_PROOF_SYSTEM:-}
      WALLET_PROOF_CIRCUIT_ID: ${WALLET_PROOF_CIRCUIT_ID:-}
      WALLET_PROOF_PROVE_PATH: ${WALLET_PROOF_PROVE_PATH:-}
      WALLET_PROOF_DISTANCE_PROVE_PATH: ${WALLET_PROOF_DISTANCE_PROVE_PATH:-}
      WALLET_PROOF_VERIFY_PATH: ${WALLET_PROOF_VERIFY_PATH:-}
      WALLET_PROOF_BEARER_TOKEN: ${WALLET_PROOF_BEARER_TOKEN:-}
      WALLET_PROOF_HTTP_HEADER_NAME: ${WALLET_PROOF_HTTP_HEADER_NAME:-}
      WALLET_PROOF_HTTP_HEADER_VALUE: ${WALLET_PROOF_HTTP_HEADER_VALUE:-}
      WALLET_PROOF_CREDENTIAL_SECRET_REF: ${WALLET_PROOF_CREDENTIAL_SECRET_REF:-}
      WALLET_PROOF_TIMEOUT_SECONDS: ${WALLET_PROOF_TIMEOUT_SECONDS:-30}
      WALLET_AUTO_LOAD_REPOSITORY: "true"
      WALLET_AUTO_PERSIST: "true"
      WALLET_OPS_HEALTH_SHARED_SECRET: ${WALLET_OPS_HEALTH_SHARED_SECRET:-change-me}
      WALLET_OPS_HEALTH_SECRET_REF: ${WALLET_OPS_HEALTH_SECRET_REF:-}
      WALLET_OPS_ALERT_WEBHOOK_URL: ${WALLET_OPS_ALERT_WEBHOOK_URL:-}
      WALLET_OPS_ALERT_ON: ${WALLET_OPS_ALERT_ON:-error}
      WALLET_OPS_ALERT_BEARER_TOKEN: ${WALLET_OPS_ALERT_BEARER_TOKEN:-}
      WALLET_OPS_ALERT_HEADER_NAME: ${WALLET_OPS_ALERT_HEADER_NAME:-}
      WALLET_OPS_ALERT_HEADER_VALUE: ${WALLET_OPS_ALERT_HEADER_VALUE:-}
      WALLET_OPS_ALERT_SECRET_REF: ${WALLET_OPS_ALERT_SECRET_REF:-}
      WALLET_STORAGE_CREDENTIAL_SECRET_REF: ${WALLET_STORAGE_CREDENTIAL_SECRET_REF:-}
      WALLET_STORAGE_RETENTION_POLICY_REF: ${WALLET_STORAGE_RETENTION_POLICY_REF:-}
      WALLET_STORAGE_IPFS_PINNING_POLICY_REF: ${WALLET_STORAGE_IPFS_PINNING_POLICY_REF:-}
      WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF: ${WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF:-}
      WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF: ${WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF:-}
      WALLET_BACKUP_PURGE_POLICY_REF: ${WALLET_BACKUP_PURGE_POLICY_REF:-}
      WALLET_ALERT_RETENTION_POLICY_REF: ${WALLET_ALERT_RETENTION_POLICY_REF:-}
    volumes:
      - wallet_state:/var/lib/211-ai
      - wallet_logs:/var/log/211-ai
    depends_on:
      - wallet-api

  wallet-ui:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.ui
      args:
        VITE_WALLET_API_BASE_URL: ${VITE_WALLET_API_BASE_URL:-same-origin}
    environment:
      VITE_WALLET_API_BASE_URL: ${VITE_WALLET_API_BASE_URL:-same-origin}
      ABBY_RUNTIME_WALLET_API_BASE_URL: ${ABBY_RUNTIME_WALLET_API_BASE_URL:-same-origin}
      ABBY_RUNTIME_WALLET_ID: ${ABBY_RUNTIME_WALLET_ID:-}
      ABBY_RUNTIME_ACTOR_DID: ${ABBY_RUNTIME_ACTOR_DID:-}
      ABBY_RUNTIME_ISSUER_KEY_HEX: ${ABBY_RUNTIME_ISSUER_KEY_HEX:-}
      ABBY_RUNTIME_AUDIENCE_KEY_HEX: ${ABBY_RUNTIME_AUDIENCE_KEY_HEX:-}
      ABBY_RUNTIME_FILECOIN_UPLOAD_URL: ${ABBY_RUNTIME_FILECOIN_UPLOAD_URL:-}
      ABBY_RUNTIME_FILECOIN_CLIENT_TOKEN: ${ABBY_RUNTIME_FILECOIN_CLIENT_TOKEN:-}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - wallet-api

volumes:
  wallet_state:
  wallet_logs:
