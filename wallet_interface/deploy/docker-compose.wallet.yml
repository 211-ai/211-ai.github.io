services:
  ipfs:
    profiles:
      - local-ipfs
    image: ipfs/go-ipfs:v0.7.0
    environment:
      IPFS_PROFILE: server
      IPFS_TELEMETRY: "off"
    restart: unless-stopped
    volumes:
      - ipfs_state:/data/ipfs

  wallet-api:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.api
    environment:
      WALLET_REPOSITORY_ROOT: /var/lib/211-ai/wallet-repository
      WALLET_STORAGE_CONFIG: ${WALLET_STORAGE_CONFIG:-}
      WALLET_STORAGE_TYPE: ${WALLET_STORAGE_TYPE:-local}
      WALLET_STORAGE_ROOT: ${WALLET_STORAGE_ROOT:-/var/lib/211-ai/wallet-blobs}
      WALLET_STORAGE_BUCKET: ${WALLET_STORAGE_BUCKET:-}
      WALLET_STORAGE_PREFIX: ${WALLET_STORAGE_PREFIX:-}
      WALLET_STORAGE_PIN: ${WALLET_STORAGE_PIN:-}
      WALLET_STORAGE_MIRRORS: ${WALLET_STORAGE_MIRRORS:-}
      IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI: ${IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI:-1}
      IPFS_HOST: ${IPFS_HOST:-/dns/ipfs/tcp/5001/http}
      WALLET_IPFS_UPLOAD_BACKEND: ${WALLET_IPFS_UPLOAD_BACKEND:-}
      WALLET_IPFS_PUBLIC_GATEWAY_BASE_URL: ${WALLET_IPFS_PUBLIC_GATEWAY_BASE_URL:-/ipfs-proxy}
      WALLET_IPFS_PROXY_ALLOWED_CIDS: ${WALLET_IPFS_PROXY_ALLOWED_CIDS:-}
      WALLET_AI_ROUTER_RATE_LIMIT_PER_MINUTE: ${WALLET_AI_ROUTER_RATE_LIMIT_PER_MINUTE:-30}
      WALLET_AI_ROUTER_RATE_LIMIT_PER_DAY: ${WALLET_AI_ROUTER_RATE_LIMIT_PER_DAY:-500}
      WALLET_AI_ROUTER_LLM_MODEL: ${WALLET_AI_ROUTER_LLM_MODEL:-Qwen/Qwen3.5-2B}
      WALLET_AI_ROUTER_MULTIMODAL_MODEL: ${WALLET_AI_ROUTER_MULTIMODAL_MODEL:-}
      IPFS_DATASETS_PY_HF_API_TOKEN: ${IPFS_DATASETS_PY_HF_API_TOKEN:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACEHUB_API_TOKEN: ${HUGGINGFACEHUB_API_TOKEN:-}
      IPFS_DATASETS_PY_HF_PROVIDER: ${IPFS_DATASETS_PY_HF_PROVIDER:-auto}
      IPFS_DATASETS_PY_HF_INFERENCE_MODEL: ${IPFS_DATASETS_PY_HF_INFERENCE_MODEL:-}
      IPFS_DATASETS_PY_HF_EMBEDDINGS_MODEL: ${IPFS_DATASETS_PY_HF_EMBEDDINGS_MODEL:-}
      IPFS_DATASETS_PY_HF_INFERENCE_PROVIDER: ${IPFS_DATASETS_PY_HF_INFERENCE_PROVIDER:-}
      IPFS_DATASETS_PY_HF_BILL_TO: ${IPFS_DATASETS_PY_HF_BILL_TO:-publicus}
      WALLET_INDEXTTS_SPACE_URL: ${WALLET_INDEXTTS_SPACE_URL:-https://indexteam-indextts-2-demo.hf.space}
      WALLET_INDEXTTS_API_NAME: ${WALLET_INDEXTTS_API_NAME:-gen_single}
      WALLET_INDEXTTS_FN_INDEX: ${WALLET_INDEXTTS_FN_INDEX:-}
      WALLET_INDEXTTS_DATA_TEMPLATE: ${WALLET_INDEXTTS_DATA_TEMPLATE:-}
      WALLET_INDEXTTS_HF_TOKEN: ${WALLET_INDEXTTS_HF_TOKEN:-}
      WALLET_INDEXTTS_HF_BILL_TO: ${WALLET_INDEXTTS_HF_BILL_TO:-publicus}
      WALLET_INDEXTTS_MODEL_NAME: ${WALLET_INDEXTTS_MODEL_NAME:-IndexTeam/IndexTTS-2-Demo}
      WALLET_INDEXTTS_REFERENCE_AUDIO_PATH: ${WALLET_INDEXTTS_REFERENCE_AUDIO_PATH:-}
      WALLET_INDEXTTS_REFERENCE_AUDIO_REMOTE_PATH: ${WALLET_INDEXTTS_REFERENCE_AUDIO_REMOTE_PATH:-}
      WALLET_INDEXTTS_TIMEOUT_SECONDS: ${WALLET_INDEXTTS_TIMEOUT_SECONDS:-180}
      WALLET_FILECOIN_PIN_SERVICE_URL: ${WALLET_FILECOIN_PIN_SERVICE_URL:-}
      WALLET_FILECOIN_PIN_ORIGINS: ${WALLET_FILECOIN_PIN_ORIGINS:-}
      WALLET_FILECOIN_PIN_BEARER_TOKEN: ${WALLET_FILECOIN_PIN_BEARER_TOKEN:-}
      WALLET_FILECOIN_PIN_HTTP_HEADER_NAME: ${WALLET_FILECOIN_PIN_HTTP_HEADER_NAME:-}
      WALLET_FILECOIN_PIN_HTTP_HEADER_VALUE: ${WALLET_FILECOIN_PIN_HTTP_HEADER_VALUE:-}
      WALLET_FILECOIN_PIN_TIMEOUT_SECONDS: ${WALLET_FILECOIN_PIN_TIMEOUT_SECONDS:-30}
      WALLET_FILECOIN_PIN_MOCK_STATUS: ${WALLET_FILECOIN_PIN_MOCK_STATUS:-pinned}
      WALLET_PROOF_MODE: production
      WALLET_PROOF_BACKEND: ${WALLET_PROOF_BACKEND:-deterministic-location-region}
      WALLET_PROOF_SERVICE_URL: ${WALLET_PROOF_SERVICE_URL:-}
      WALLET_PROOF_VERIFIER_ID: ${WALLET_PROOF_VERIFIER_ID:-}
      WALLET_PROOF_SYSTEM: ${WALLET_PROOF_SYSTEM:-}
      WALLET_PROOF_CIRCUIT_ID: ${WALLET_PROOF_CIRCUIT_ID:-}
      WALLET_PROOF_PROVE_PATH: ${WALLET_PROOF_PROVE_PATH:-}
      WALLET_PROOF_DISTANCE_PROVE_PATH: ${WALLET_PROOF_DISTANCE_PROVE_PATH:-}
      WALLET_PROOF_VERIFY_PATH: ${WALLET_PROOF_VERIFY_PATH:-}
      WALLET_PROOF_BEARER_TOKEN: ${WALLET_PROOF_BEARER_TOKEN:-}
      WALLET_PROOF_HTTP_HEADER_NAME: ${WALLET_PROOF_HTTP_HEADER_NAME:-}
      WALLET_PROOF_HTTP_HEADER_VALUE: ${WALLET_PROOF_HTTP_HEADER_VALUE:-}
      WALLET_PROOF_CREDENTIAL_SECRET_REF: ${WALLET_PROOF_CREDENTIAL_SECRET_REF:-}
      WALLET_PROOF_TIMEOUT_SECONDS: ${WALLET_PROOF_TIMEOUT_SECONDS:-30}
      WALLET_AUTO_LOAD_REPOSITORY: "true"
      WALLET_AUTO_PERSIST: "true"
      WALLET_API_CORS_ORIGINS: ${WALLET_API_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,https://211-ai.com,https://abby.network,https://abetterbridgetoyou.com}
      WALLET_OPS_HEALTH_SHARED_SECRET: ${WALLET_OPS_HEALTH_SHARED_SECRET:-change-me}
      WALLET_OPS_HEALTH_SECRET_REF: ${WALLET_OPS_HEALTH_SECRET_REF:-}
      WALLET_OPS_ALERT_BEARER_TOKEN: ${WALLET_OPS_ALERT_BEARER_TOKEN:-}
      WALLET_OPS_ALERT_HEADER_NAME: ${WALLET_OPS_ALERT_HEADER_NAME:-}
      WALLET_OPS_ALERT_HEADER_VALUE: ${WALLET_OPS_ALERT_HEADER_VALUE:-}
      WALLET_OPS_ALERT_SECRET_REF: ${WALLET_OPS_ALERT_SECRET_REF:-}
      WALLET_DEAD_DROP_SMTP_HOST: ${WALLET_DEAD_DROP_SMTP_HOST:-}
      WALLET_DEAD_DROP_SMTP_PORT: ${WALLET_DEAD_DROP_SMTP_PORT:-587}
      WALLET_DEAD_DROP_SMTP_USE_SSL: ${WALLET_DEAD_DROP_SMTP_USE_SSL:-false}
      WALLET_DEAD_DROP_SMTP_STARTTLS: ${WALLET_DEAD_DROP_SMTP_STARTTLS:-true}
      WALLET_DEAD_DROP_SMTP_USERNAME: ${WALLET_DEAD_DROP_SMTP_USERNAME:-}
      WALLET_DEAD_DROP_SMTP_PASSWORD: ${WALLET_DEAD_DROP_SMTP_PASSWORD:-}
      WALLET_DEAD_DROP_FROM_EMAIL: ${WALLET_DEAD_DROP_FROM_EMAIL:-no-reply@211-ai.org}
      WALLET_DEAD_DROP_BACKEND: ${WALLET_DEAD_DROP_BACKEND:-http}
      WALLET_DEAD_DROP_WEBHOOK_URL: ${WALLET_DEAD_DROP_WEBHOOK_URL:-http://sms-bridge:8061/messages/email/outbound}
      WALLET_DEAD_DROP_BEARER_TOKEN: ${WALLET_DEAD_DROP_BEARER_TOKEN:-}
      WALLET_DEAD_DROP_HTTP_HEADER_NAME: ${WALLET_DEAD_DROP_HTTP_HEADER_NAME:-}
      WALLET_DEAD_DROP_HTTP_HEADER_VALUE: ${WALLET_DEAD_DROP_HTTP_HEADER_VALUE:-}
      WALLET_DEAD_DROP_TIMEOUT_SECONDS: ${WALLET_DEAD_DROP_TIMEOUT_SECONDS:-20}
      WALLET_SMS_BACKEND: ${WALLET_SMS_BACKEND:-http}
      WALLET_SMS_WEBHOOK_URL: ${WALLET_SMS_WEBHOOK_URL:-http://sms-bridge:8061/messages/sms/outbound}
      WALLET_SMS_BEARER_TOKEN: ${WALLET_SMS_BEARER_TOKEN:-}
      WALLET_SMS_HTTP_HEADER_NAME: ${WALLET_SMS_HTTP_HEADER_NAME:-}
      WALLET_SMS_HTTP_HEADER_VALUE: ${WALLET_SMS_HTTP_HEADER_VALUE:-}
      WALLET_SMS_TIMEOUT_SECONDS: ${WALLET_SMS_TIMEOUT_SECONDS:-15}
      WALLET_SMS_INBOUND_BEARER_TOKEN: ${WALLET_SMS_INBOUND_BEARER_TOKEN:-change-me}
      WALLET_SMS_INBOUND_HTTP_HEADER_NAME: ${WALLET_SMS_INBOUND_HTTP_HEADER_NAME:-}
      WALLET_SMS_INBOUND_HTTP_HEADER_VALUE: ${WALLET_SMS_INBOUND_HTTP_HEADER_VALUE:-}
      WALLET_SMS_INBOUND_ACTOR_DID: ${WALLET_SMS_INBOUND_ACTOR_DID:-did:wallet:sms-bridge}
      WALLET_CALL_BACKEND: ${WALLET_CALL_BACKEND:-http}
      WALLET_CALL_WEBHOOK_URL: ${WALLET_CALL_WEBHOOK_URL:-http://sms-bridge:8061/messages/calls/outbound}
      WALLET_CALL_BEARER_TOKEN: ${WALLET_CALL_BEARER_TOKEN:-}
      WALLET_CALL_HTTP_HEADER_NAME: ${WALLET_CALL_HTTP_HEADER_NAME:-}
      WALLET_CALL_HTTP_HEADER_VALUE: ${WALLET_CALL_HTTP_HEADER_VALUE:-}
      WALLET_CALL_TIMEOUT_SECONDS: ${WALLET_CALL_TIMEOUT_SECONDS:-20}
      WALLET_STORAGE_CREDENTIAL_SECRET_REF: ${WALLET_STORAGE_CREDENTIAL_SECRET_REF:-}
      WALLET_STORAGE_RETENTION_POLICY_REF: ${WALLET_STORAGE_RETENTION_POLICY_REF:-}
      WALLET_STORAGE_IPFS_PINNING_POLICY_REF: ${WALLET_STORAGE_IPFS_PINNING_POLICY_REF:-}
      WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF: ${WALLET_STORAGE_FILECOIN_DEAL_POLICY_REF:-}
      WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF: ${WALLET_STORAGE_S3_LIFECYCLE_POLICY_REF:-}
      WALLET_BACKUP_PURGE_POLICY_REF: ${WALLET_BACKUP_PURGE_POLICY_REF:-}
      WALLET_ALERT_RETENTION_POLICY_REF: ${WALLET_ALERT_RETENTION_POLICY_REF:-}
    volumes:
      - wallet_state:/var/lib/211-ai
      - ${IPFS_DATASETS_SECRETS_DIR:-/home/barberb/.ipfs_datasets}:/root/.ipfs_datasets:ro
    depends_on:
      - sms-bridge

  sms-bridge:
    build:
      context: ../../ipfs_datasets_py
      dockerfile: Dockerfile.sms_bridge
    command:
      - python
      - -m
      - ipfs_datasets_py.messaging.sms_bridge
      - --host
      - 0.0.0.0
      - --port
      - "8061"
    environment:
      IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI: ${IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI:-}
      IPFS_HOST: ${IPFS_HOST:-}
      IPFS_DATASETS_SMS_BRIDGE_DB_PATH: /var/lib/211-ai/sms-bridge/sms_bridge.duckdb
      IPFS_DATASETS_SMS_BRIDGE_ARCHIVE_EXPORT_ENABLED: ${IPFS_DATASETS_SMS_BRIDGE_ARCHIVE_EXPORT_ENABLED:-}
      IPFS_DATASETS_SMS_BRIDGE_ARCHIVE_EXPORT_INTERVAL_SECONDS: ${IPFS_DATASETS_SMS_BRIDGE_ARCHIVE_EXPORT_INTERVAL_SECONDS:-3600}
      IPFS_DATASETS_SMS_BRIDGE_ARCHIVE_EXPORT_ROOT: ${IPFS_DATASETS_SMS_BRIDGE_ARCHIVE_EXPORT_ROOT:-/var/lib/211-ai/sms-bridge/exports}
      IPFS_DATASETS_SMS_PROVIDER_KIND: ${IPFS_DATASETS_SMS_PROVIDER_KIND:-}
      IPFS_DATASETS_SMS_PROVIDER_WEBHOOK_URL: ${IPFS_DATASETS_SMS_PROVIDER_WEBHOOK_URL:-}
      IPFS_DATASETS_SMS_PROVIDER_BEARER_TOKEN: ${IPFS_DATASETS_SMS_PROVIDER_BEARER_TOKEN:-}
      IPFS_DATASETS_SMS_PROVIDER_HTTP_HEADER_NAME: ${IPFS_DATASETS_SMS_PROVIDER_HTTP_HEADER_NAME:-}
      IPFS_DATASETS_SMS_PROVIDER_HTTP_HEADER_VALUE: ${IPFS_DATASETS_SMS_PROVIDER_HTTP_HEADER_VALUE:-}
      IPFS_DATASETS_SMS_PROVIDER_TIMEOUT_SECONDS: ${IPFS_DATASETS_SMS_PROVIDER_TIMEOUT_SECONDS:-15}
      IPFS_DATASETS_SMS_TWILIO_ACCOUNT_SID: ${IPFS_DATASETS_SMS_TWILIO_ACCOUNT_SID:-}
      IPFS_DATASETS_SMS_TWILIO_AUTH_TOKEN: ${IPFS_DATASETS_SMS_TWILIO_AUTH_TOKEN:-}
      IPFS_DATASETS_SMS_TWILIO_FROM_PHONE: ${IPFS_DATASETS_SMS_TWILIO_FROM_PHONE:-}
      IPFS_DATASETS_SMS_TWILIO_MESSAGING_SERVICE_SID: ${IPFS_DATASETS_SMS_TWILIO_MESSAGING_SERVICE_SID:-}
      IPFS_DATASETS_SMS_TWILIO_STATUS_CALLBACK_URL: ${IPFS_DATASETS_SMS_TWILIO_STATUS_CALLBACK_URL:-https://211-ai.com/messaging/providers/twilio/status}
      IPFS_DATASETS_SMS_INBOUND_FORWARD_URL: ${IPFS_DATASETS_SMS_INBOUND_FORWARD_URL:-http://wallet-api:8000/messages/sms/inbound}
      IPFS_DATASETS_SMS_INBOUND_FORWARD_BEARER_TOKEN: ${WALLET_SMS_INBOUND_BEARER_TOKEN:-change-me}
      IPFS_DATASETS_SMS_INBOUND_FORWARD_HTTP_HEADER_NAME: ${WALLET_SMS_INBOUND_HTTP_HEADER_NAME:-}
      IPFS_DATASETS_SMS_INBOUND_FORWARD_HTTP_HEADER_VALUE: ${WALLET_SMS_INBOUND_HTTP_HEADER_VALUE:-}
      IPFS_DATASETS_SMS_INBOUND_FORWARD_TIMEOUT_SECONDS: ${IPFS_DATASETS_SMS_INBOUND_FORWARD_TIMEOUT_SECONDS:-15}
      IPFS_DATASETS_EMAIL_PROVIDER_KIND: ${IPFS_DATASETS_EMAIL_PROVIDER_KIND:-}
      IPFS_DATASETS_EMAIL_PROVIDER_WEBHOOK_URL: ${IPFS_DATASETS_EMAIL_PROVIDER_WEBHOOK_URL:-}
      IPFS_DATASETS_EMAIL_PROVIDER_BEARER_TOKEN: ${IPFS_DATASETS_EMAIL_PROVIDER_BEARER_TOKEN:-}
      IPFS_DATASETS_EMAIL_PROVIDER_HTTP_HEADER_NAME: ${IPFS_DATASETS_EMAIL_PROVIDER_HTTP_HEADER_NAME:-}
      IPFS_DATASETS_EMAIL_PROVIDER_HTTP_HEADER_VALUE: ${IPFS_DATASETS_EMAIL_PROVIDER_HTTP_HEADER_VALUE:-}
      IPFS_DATASETS_EMAIL_PROVIDER_TIMEOUT_SECONDS: ${IPFS_DATASETS_EMAIL_PROVIDER_TIMEOUT_SECONDS:-20}
      WALLET_DEAD_DROP_SMTP_HOST: ${WALLET_DEAD_DROP_SMTP_HOST:-}
      WALLET_DEAD_DROP_SMTP_PORT: ${WALLET_DEAD_DROP_SMTP_PORT:-587}
      WALLET_DEAD_DROP_SMTP_USE_SSL: ${WALLET_DEAD_DROP_SMTP_USE_SSL:-false}
      WALLET_DEAD_DROP_SMTP_STARTTLS: ${WALLET_DEAD_DROP_SMTP_STARTTLS:-true}
      WALLET_DEAD_DROP_SMTP_USERNAME: ${WALLET_DEAD_DROP_SMTP_USERNAME:-}
      WALLET_DEAD_DROP_SMTP_PASSWORD: ${WALLET_DEAD_DROP_SMTP_PASSWORD:-}
      WALLET_DEAD_DROP_FROM_EMAIL: ${WALLET_DEAD_DROP_FROM_EMAIL:-no-reply@211-ai.org}
      WALLET_FILECOIN_PIN_SERVICE_URL: ${WALLET_FILECOIN_PIN_SERVICE_URL:-}
      WALLET_FILECOIN_PIN_ORIGINS: ${WALLET_FILECOIN_PIN_ORIGINS:-}
      WALLET_FILECOIN_PIN_BEARER_TOKEN: ${WALLET_FILECOIN_PIN_BEARER_TOKEN:-}
      WALLET_FILECOIN_PIN_HTTP_HEADER_NAME: ${WALLET_FILECOIN_PIN_HTTP_HEADER_NAME:-}
      WALLET_FILECOIN_PIN_HTTP_HEADER_VALUE: ${WALLET_FILECOIN_PIN_HTTP_HEADER_VALUE:-}
      WALLET_FILECOIN_PIN_TIMEOUT_SECONDS: ${WALLET_FILECOIN_PIN_TIMEOUT_SECONDS:-30}
      WALLET_FILECOIN_PIN_MOCK_STATUS: ${WALLET_FILECOIN_PIN_MOCK_STATUS:-pinned}
      IPFS_DATASETS_CALL_PROVIDER_KIND: ${IPFS_DATASETS_CALL_PROVIDER_KIND:-}
      IPFS_DATASETS_CALL_PROVIDER_WEBHOOK_URL: ${IPFS_DATASETS_CALL_PROVIDER_WEBHOOK_URL:-}
      IPFS_DATASETS_CALL_PROVIDER_BEARER_TOKEN: ${IPFS_DATASETS_CALL_PROVIDER_BEARER_TOKEN:-}
      IPFS_DATASETS_CALL_PROVIDER_HTTP_HEADER_NAME: ${IPFS_DATASETS_CALL_PROVIDER_HTTP_HEADER_NAME:-}
      IPFS_DATASETS_CALL_PROVIDER_HTTP_HEADER_VALUE: ${IPFS_DATASETS_CALL_PROVIDER_HTTP_HEADER_VALUE:-}
      IPFS_DATASETS_CALL_PROVIDER_TIMEOUT_SECONDS: ${IPFS_DATASETS_CALL_PROVIDER_TIMEOUT_SECONDS:-20}
      IPFS_DATASETS_CALL_TWILIO_ACCOUNT_SID: ${IPFS_DATASETS_CALL_TWILIO_ACCOUNT_SID:-}
      IPFS_DATASETS_CALL_TWILIO_AUTH_TOKEN: ${IPFS_DATASETS_CALL_TWILIO_AUTH_TOKEN:-}
      IPFS_DATASETS_CALL_TWILIO_FROM_PHONE: ${IPFS_DATASETS_CALL_TWILIO_FROM_PHONE:-}
      IPFS_DATASETS_CALL_TWILIO_STATUS_CALLBACK_URL: ${IPFS_DATASETS_CALL_TWILIO_STATUS_CALLBACK_URL:-https://211-ai.com/messaging/providers/twilio/voice/status}
      IPFS_DATASETS_VOICE_MEDIA_ROOT: /var/lib/211-ai/sms-bridge/voice-media
      IPFS_DATASETS_VOICE_PUBLIC_BASE_URL: ${IPFS_DATASETS_VOICE_PUBLIC_BASE_URL:-https://211-ai.com/messaging}
      IPFS_DATASETS_VOICE_REPLY_PROVIDER_KIND: ${IPFS_DATASETS_VOICE_REPLY_PROVIDER_KIND:-}
      IPFS_DATASETS_VOICE_MOCK_REPLY_TEXT: ${IPFS_DATASETS_VOICE_MOCK_REPLY_TEXT:-}
      IPFS_DATASETS_VOICE_PROXY_BASE_URL: ${IPFS_DATASETS_VOICE_PROXY_BASE_URL:-}
      IPFS_DATASETS_VOICE_PROXY_INFER_URL: ${IPFS_DATASETS_VOICE_PROXY_INFER_URL:-}
      IPFS_DATASETS_VOICE_PROXY_TTS_URL: ${IPFS_DATASETS_VOICE_PROXY_TTS_URL:-}
      IPFS_DATASETS_VOICE_PROXY_STT_URL: ${IPFS_DATASETS_VOICE_PROXY_STT_URL:-}
      IPFS_DATASETS_VOICE_PROXY_TIMEOUT_SECONDS: ${IPFS_DATASETS_VOICE_PROXY_TIMEOUT_SECONDS:-45}
      IPFS_DATASETS_VOICE_AGENT_NAME: ${IPFS_DATASETS_VOICE_AGENT_NAME:-Abby}
      IPFS_DATASETS_VOICE_SERVICE_NAME: ${IPFS_DATASETS_VOICE_SERVICE_NAME:-211 AI}
      IPFS_DATASETS_VOICE_WEBSITE_URL: ${IPFS_DATASETS_VOICE_WEBSITE_URL:-https://211-ai.com}
      IPFS_DATASETS_VOICE_SYSTEM_PROMPT_APPEND: ${IPFS_DATASETS_VOICE_SYSTEM_PROMPT_APPEND:-}
      IPFS_DATASETS_VOICE_MAX_TURNS: ${IPFS_DATASETS_VOICE_MAX_TURNS:-8}
    restart: unless-stopped
    volumes:
      - sms_bridge_state:/var/lib/211-ai/sms-bridge

  filecoin-pin:
    profiles:
      - filecoin-pin
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.filecoin-pin
      args:
        FILECOIN_PIN_NPM_VERSION: ${FILECOIN_PIN_VERSION:-0.20.1}
    command:
      - filecoin-pin
      - server
      - --host
      - 0.0.0.0
      - --port
      - "3456"
      - --database
      - /var/lib/filecoin-pin/pins.db
      - --car-storage
      - /var/lib/filecoin-pin/cars
    environment:
      ACCESS_TOKEN: ${FILECOIN_PIN_ACCESS_TOKEN:-}
      PRIVATE_KEY: ${FILECOIN_PIN_PRIVATE_KEY:-}
      WALLET_ADDRESS: ${FILECOIN_PIN_WALLET_ADDRESS:-}
      SESSION_KEY: ${FILECOIN_PIN_SESSION_KEY:-}
      NETWORK: ${FILECOIN_PIN_NETWORK:-}
      RPC_URL: ${FILECOIN_PIN_RPC_URL:-}
      LOG_LEVEL: ${FILECOIN_PIN_LOG_LEVEL:-info}
    restart: unless-stopped
    volumes:
      - filecoin_pin_state:/var/lib/filecoin-pin

  wallet-ops:
    build:
      context: ../..
      dockerfile: wallet_interface/deploy/Dockerfile.api
    command:
      - python
      - -m
      - wallet_interface.ops
      - --watch
      - --interval-seconds
      - "300"
      - --fail-on-error
      - --output-jsonl
      - /var/log/211-ai/wallet-ops-health.jsonl
    environment:
      WALLET_REPOSITORY_ROOT: /var/lib/211-ai/wallet-repository
      WALLET_STORAGE_CONFIG: ${WALLET_STORAGE_CONFIG:-}
      WALLET_STORAGE_TYPE: ${WALLET_STORAGE_TYPE:-local}
      WALLET_STORAGE_ROOT: ${WALLET_STORAGE_ROOT:-/var/lib/211-ai/wallet-blobs}
      WALLET_STORAGE_BUCKET: ${WALLET_STORAGE_BUCKET:-}
      WALLET_STORAGE_PREFIX: ${WALLET_STORAGE_PREFIX:-}
      WALLET_STORAGE_PIN: ${WALLET_STORAGE_PIN:-}
      WALLET_STORAGE_MIRRORS: ${WALLET_STORAGE_MIRRORS:-}
      IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI: ${IPFS_DATASETS_PY_ENABLE_IPFS_HTTPAPI:-}
      IPFS_HOST: ${IPFS_HOST:-}
      WALLET_PROOF_MODE: production
      WALLET_PROOF_BACKEND: ${WALLET_PROOF_BACKEND:-deterministic-location-region}
      WALLET_PROOF_SERVICE_URL: ${WALLET_PROOF_SERVICE_URL:-}
      WALLET_PROOF_VERIFIER_ID: ${WALLET_PROOF_VERIFIER_ID:-}
      WALLET_PROOF_SYSTEM: ${WALLET_PROOF_SYSTEM:-}
      WALLET_PROOF_CIRCUIT_ID: ${WALLET_PROOF_CIRCUIT_ID:-}
      WALLET_PROOF_PROVE_PATH: ${WALLET_PROOF_PROVE_PATH:-}
      WALLET_PROOF_DISTANCE_PROVE_PATH: ${WALLET_PROOF_DISTANCE_PROVE_PATH:-}
      WALLET_PROOF_VERIFY_PATH: ${WALLET_PROOF_VERIFY_PATH:-}
      WALLET_PROOF_BEARER_TOKEN: ${WALLET_PROOF_BEARER_TOKEN:-}
      WALLET_PROOF_HTTP_HEADER_NAME: ${WALLET_PROOF_HTTP_HEADER_NAME:-}
      WALLET_PROOF_HTTP_HEADER_VALUE: ${WALLET_PROOF_HTTP_HEADER_VALUE:-}
      WALLET_PROOF_CREDENTIAL_SECRET_REF: ${WALLET_PROOF_CREDENTIAL_SECRET_REF:-}
      WALLET_PROOF_TIMEOUT_SECONDS: ${WALLET_PROOF_TIMEOUT_SECONDS:-30}
      WALLET_AUTO_LOAD_REPOSITORY: "true"
      WALLET_AUTO_PERSIST: "true"
