apiVersion: v1
kind: Service
metadata:
  name: wallet-api
  namespace: wallet-interface
spec:
  selector:
    app.kubernetes.io/name: wallet-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-ui
  namespace: wallet-interface
spec:
  selector:
    app.kubernetes.io/name: wallet-ui
  ports:
    - name: http
      port: 8080
      targetPort: http

