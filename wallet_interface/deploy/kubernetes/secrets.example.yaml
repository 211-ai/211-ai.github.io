apiVersion: v1
kind: Secret
metadata:
  name: wallet-interface-secrets
  namespace: wallet-interface
type: Opaque
stringData:
  WALLET_OPS_HEALTH_SHARED_SECRET: change-me
  WALLET_OPS_HEALTH_SECRET_REF: /211-ai/wallet/prod/ops-health-shared-secret
  WALLET_OPS_ALERT_WEBHOOK_URL: https://ops.example.com/hooks/211-wallet
  WALLET_OPS_ALERT_BEARER_TOKEN: change-me
  WALLET_OPS_ALERT_HEADER_NAME: x-wallet-alert-key
  WALLET_OPS_ALERT_HEADER_VALUE: change-me
  WALLET_OPS_ALERT_SECRET_REF: /211-ai/wallet/prod/ops-alert
  WALLET_PROOF_SERVICE_URL: https://verifier.example.com
  WALLET_PROOF_VERIFIER_ID: verifier-http-v1
  WALLET_PROOF_SYSTEM: groth16
  WALLET_PROOF_CIRCUIT_ID: location-region-v1
  WALLET_PROOF_PROVE_PATH: /prove/location-region
  WALLET_PROOF_DISTANCE_PROVE_PATH: /prove/location-distance
  WALLET_PROOF_VERIFY_PATH: /verify
  WALLET_PROOF_BEARER_TOKEN: change-me
  WALLET_PROOF_HTTP_HEADER_NAME: x-wallet-proof-key
  WALLET_PROOF_HTTP_HEADER_VALUE: change-me
  WALLET_PROOF_CREDENTIAL_SECRET_REF: /211-ai/wallet/prod/proof-verifier
  WALLET_STORAGE_CONFIG: |
    {"primary":{"type":"local","root":"/var/lib/211-ai/wallet-blobs"}}
  WALLET_STORAGE_CREDENTIAL_SECRET_REF: /211-ai/wallet/prod/storage
  WALLET_PROOF_BACKEND: http-location-region
