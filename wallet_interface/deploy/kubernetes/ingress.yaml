apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wallet-interface
  namespace: wallet-interface
spec:
  rules:
    - host: wallet.example.internal
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: wallet-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wallet-ui
                port:
                  number: 8080

