apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-ui
  namespace: wallet-interface
  labels:
    app.kubernetes.io/name: wallet-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-ui
    spec:
      containers:
        - name: wallet-ui
          image: wallet-interface-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

