apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-api
  namespace: wallet-interface
  labels:
    app.kubernetes.io/name: wallet-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-api
    spec:
      containers:
        - name: wallet-api
          image: wallet-interface-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: wallet-interface-config
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: wallet-state
              mountPath: /var/lib/211-ai
      volumes:
        - name: wallet-state
          persistentVolumeClaim:
            claimName: wallet-state-pvc

