# Example External Secrets Operator mapping.
# Replace the SecretStore/ClusterSecretStore reference and remote keys with the
# target environment's secret manager paths before applying.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wallet-interface-secrets
  namespace: wallet-interface
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: wallet-production-secrets
    kind: ClusterSecretStore
  target:
    name: wallet-interface-secrets
    creationPolicy: Owner
  data:
    - secretKey: WALLET_OPS_HEALTH_SHARED_SECRET
      remoteRef:
        key: /211-ai/wallet/prod/ops-health-shared-secret
    - secretKey: WALLET_OPS_ALERT_WEBHOOK_URL
      remoteRef:
        key: /211-ai/wallet/prod/ops-alert-webhook-url
    - secretKey: WALLET_OPS_ALERT_BEARER_TOKEN
      remoteRef:
        key: /211-ai/wallet/prod/ops-alert-bearer-token
    - secretKey: WALLET_OPS_ALERT_HEADER_NAME
      remoteRef:
        key: /211-ai/wallet/prod/ops-alert-header-name
    - secretKey: WALLET_OPS_ALERT_HEADER_VALUE
      remoteRef:
        key: /211-ai/wallet/prod/ops-alert-header-value
    - secretKey: WALLET_PROOF_SERVICE_URL
      remoteRef:
        key: /211-ai/wallet/prod/proof-service-url
    - secretKey: WALLET_PROOF_VERIFIER_ID
      remoteRef:
        key: /211-ai/wallet/prod/proof-verifier-id
    - secretKey: WALLET_PROOF_SYSTEM
      remoteRef:
        key: /211-ai/wallet/prod/proof-system
    - secretKey: WALLET_PROOF_CIRCUIT_ID
      remoteRef:
        key: /211-ai/wallet/prod/proof-circuit-id
    - secretKey: WALLET_PROOF_PROVE_PATH
      remoteRef:
        key: /211-ai/wallet/prod/proof-prove-path
    - secretKey: WALLET_PROOF_VERIFY_PATH
      remoteRef:
        key: /211-ai/wallet/prod/proof-verify-path
    - secretKey: WALLET_PROOF_BEARER_TOKEN
      remoteRef:
        key: /211-ai/wallet/prod/proof-bearer-token
    - secretKey: WALLET_PROOF_HTTP_HEADER_NAME
      remoteRef:
        key: /211-ai/wallet/prod/proof-http-header-name
    - secretKey: WALLET_PROOF_HTTP_HEADER_VALUE
      remoteRef:
        key: /211-ai/wallet/prod/proof-http-header-value
    - secretKey: WALLET_STORAGE_CONFIG
      remoteRef:
        key: /211-ai/wallet/prod/storage-config
