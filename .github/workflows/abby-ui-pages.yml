name: Deploy Abby UI to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "wallet_interface/ui/**"
      - ".github/workflows/abby-ui-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "abby-ui-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallet_interface/ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wallet_interface/ui/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        env:
          ONNXRUNTIME_NODE_INSTALL: skip
        run: npm ci

      - name: Run Filecoin polling regression check
        run: npm run test:filecoin-polling

      - name: Write Pages runtime config
        env:
          ABBY_PAGES_WALLET_API_BASE_URL: ${{ vars.ABBY_PAGES_WALLET_API_BASE_URL }}
          ABBY_PAGES_WALLET_ID: ${{ vars.ABBY_PAGES_WALLET_ID }}
          ABBY_PAGES_ACTOR_DID: ${{ vars.ABBY_PAGES_ACTOR_DID }}
          ABBY_PAGES_FILECOIN_UPLOAD_URL: ${{ vars.ABBY_PAGES_FILECOIN_UPLOAD_URL }}
        run: |
          node <<'EOF'
          const fs = require('fs');

          const normalize = (value) => {
            if (typeof value !== 'string') return undefined;
            const trimmed = value.trim();
            return trimmed ? trimmed : undefined;
          };

          const config = {};
          const walletApiBaseUrl = normalize(process.env.ABBY_PAGES_WALLET_API_BASE_URL);
          const walletId = normalize(process.env.ABBY_PAGES_WALLET_ID);
          const actorDid = normalize(process.env.ABBY_PAGES_ACTOR_DID);
          const filecoinUploadUrl = normalize(process.env.ABBY_PAGES_FILECOIN_UPLOAD_URL);

          if (walletApiBaseUrl && walletId) {
            config.walletApi = { apiBaseUrl: walletApiBaseUrl, walletId };
            if (actorDid) config.walletApi.actorDid = actorDid;
          }

          if (filecoinUploadUrl) {
            config.filecoinStorage = { uploadUrl: filecoinUploadUrl };
          }

          fs.writeFileSync('public/runtime-config.json', JSON.stringify(config, null, 2) + '\n');
          EOF

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wallet_interface/ui/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
